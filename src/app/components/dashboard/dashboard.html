<div class="min-h-screen bg-gray-100">

    <!-- Navbar -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center">

        <h1 class="text-xl font-bold">
            Mi Drive
        </h1>
        <h2 class="text-2xl font-semibold mb-6 mr-5">
            Bienvenido {{ username }}
        </h2>

        <button (click)="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">
            Cerrar sesión
        </button>

    </header>

    <!-- Contenido -->
    <main class="p-8">

        <div class="flex">



            <button (click)="agregarCarpeta()"
                class="text-2xl bg-blue-500 text-white px-3 py-3 rounded-full hover:bg-blue-600 transition mb-10">
                Crear carpeta
            </button>

            <div *ngIf="mostrarInput" class="mt-4 flex gap-2">

                <div class="bg-white pt-4 h-20 w-60 text-center rounded-full shadow-md">
                    <input type="text" [(ngModel)]="nombreNuevaCarpeta" placeholder="Nombre de la carpeta" (keyup.enter)="crearCarpeta()"
                        class="border rounded-lg px-3 py-1">

                    <button (click)="crearCarpeta()" class="bg-green-500 text-white px-3 rounded-lg">
                        Crear
                    </button>

                    <button (click)="cancelar()" class="bg-gray-500 text-white px-3 rounded-lg">
                        Cancelar
                    </button>
                </div>

            </div>
        </div>



        <!-- Carpetas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6    ">
            <app-carpeta *ngFor="let carpeta of pruebaCarpetas" [nombre]="carpeta.name" [peso]="carpeta.peso">
            </app-carpeta>

        </div>
    </main>

</div>
